<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasply | Personal Homepage</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 矩阵雨背景 -->
    <canvas id="matrix"></canvas>
    
    <!-- 扫描线效果 -->
    <div class="scanline"></div>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 首页大卡片 - 参考图风格 -->
        <section class="card hero-section" id="home-section">
            <div class="card-corners">
                <span class="corner tl"></span>
                <span class="corner tr"></span>
                <span class="corner bl"></span>
                <span class="corner br"></span>
            </div>
            <div class="hero-body">
                <div class="hero-avatar">
                    <div class="avatar-glow"></div>
                    <div class="avatar-ring"></div>
                    <div class="avatar-circle" id="avatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div class="hero-content">
                    <h1 class="hero-name glitch" id="name" data-text="Nasply">Nasply</h1>
                    <p class="hero-title" id="title">技术爱好者 / NAS 玩家 / 自动化实践</p>
                    <p class="hero-bio" id="bio">热爱折腾，享受自动化带来的便利。<br>专注于构建高效、智能的个人技术栈。</p>
                    <div class="hero-footer">
                        <span class="hero-status">
                            <span class="status-dot small"></span>
                            <span class="status-text">ONLINE</span>
                        </span>
                        <span class="hero-divider"></span>
                        <span class="hero-location">
                            <i class="fas fa-map-marker-alt"></i>
                            <span id="location">中国</span>
                        </span>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- ABOUT 模块 -->
        <section class="card about-section" id="about-section">
            <div class="card-corners">
                <span class="corner tl"></span>
                <span class="corner tr"></span>
                <span class="corner bl"></span>
                <span class="corner br"></span>
            </div>
            <h2 class="section-header">
                <span class="header-icon"><i class="fas fa-user-astronaut"></i></span>
                <span class="header-text">ABOUT ME</span>
                <span class="header-line"></span>
            </h2>
            <div class="about-content">
                <p class="about-text" id="about-bio">加载中...</p>
                <div class="about-stats">
                    <div class="stat-item">
                        <span class="stat-value">5+</span>
                        <span class="stat-label">年经验</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">20+</span>
                        <span class="stat-label">项目</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">∞</span>
                        <span class="stat-label">热情</span>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- 技能矩阵卡片 -->
        <section class="card skills-section" id="skills-section">
            <div class="card-corners">
                <span class="corner tl"></span>
                <span class="corner tr"></span>
                <span class="corner bl"></span>
                <span class="corner br"></span>
            </div>
            <h2 class="section-header">
                <span class="header-icon"><i class="fas fa-microchip"></i></span>
                <span class="header-text">SKILL_MATRIX</span>
                <span class="header-line"></span>
            </h2>
            <div class="skills-body" id="skills">
                <!-- 动态加载 -->
            </div>
        </section>
        
        <!-- 项目展示卡片 -->
        <section class="card projects-section" id="projects-section">
            <div class="card-corners">
                <span class="corner tl"></span>
                <span class="corner tr"></span>
                <span class="corner bl"></span>
                <span class="corner br"></span>
            </div>
            <h2 class="section-header">
                <span class="header-icon"><i class="fas fa-folder"></i></span>
                <span class="header-text">精选项目</span>
                <span class="header-line"></span>
            </h2>
            <div class="projects-body" id="projects">
                <!-- 动态加载 -->
            </div>
        </section>
        
        <!-- 社交链接卡片 -->
        <section class="card connect-section" id="connect-section">
            <div class="card-corners">
                <span class="corner tl"></span>
                <span class="corner tr"></span>
                <span class="corner bl"></span>
                <span class="corner br"></span>
            </div>
            <h2 class="section-header">
                <span class="header-icon"><i class="fas fa-link"></i></span>
                <span class="header-text">CONNECT</span>
                <span class="header-line"></span>
            </h2>
            <div class="connect-body" id="links">
                <!-- 动态加载 -->
            </div>
        </section>
        
        <!-- 底部终端栏 -->
        <footer class="terminal-bar">
            <div class="terminal-left">
                <span class="terminal-prompt">root@nasply:~$</span>
                <span class="terminal-command">whoami</span>
                <span class="terminal-cursor"></span>
            </div>
            <div class="terminal-middle">
                <span class="terminal-output-user" id="terminal-user">nasply</span>
                <span class="terminal-output-desc" id="terminal-desc">— 技术折腾者 & 自动化实践者</span>
            </div>
            <div class="terminal-right">
                <span class="terminal-status">SYSTEM ONLINE</span>
                <span class="status-dot tiny"></span>
                <span class="terminal-time" id="timestamp">2024-06-26 16:14:18</span>
            </div>
        </footer>
    </div>
    
    <!-- 返回顶部按钮 -->
    <button class="back-to-top" id="backToTop" title="返回顶部">
        <i class="fas fa-arrow-up"></i>
    </button>
    
    <!-- 管理入口浮动按钮 -->
    <a href="/login" class="admin-btn" target="_self" title="管理后台">
        <i class="fas fa-cog"></i>
    </a>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
